version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kotlin-quickstart-postgres
    environment:
      POSTGRES_DB: kotlin_quickstart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kotlin-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kotlin-quickstart-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kotlin-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  kotlin-network:
    driver: bridge 